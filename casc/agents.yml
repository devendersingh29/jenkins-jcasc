jenkins:
  nodes:
    - permanent:
        name: "docker-agent-1"
        remoteFS: "/home/jenkins"
        numExecutors: 2
        labelString: "team-alpha"
        mode: NORMAL
        launcher:
          ssh:
            host: "docker-agent-1"
            port: 22
            credentialsId: "ssh-agent-key"
            jvmOptions: ""
  clouds:
    - docker:
        name: "docker-cloud"
        dockerApi:
          dockerHost:
            uri: "unix:///var/run/docker.sock"
        templates:
          - labelString: "team-beta"
            dockerTemplateBase:
              image: "jenkins/inbound-agent:latest"
            remoteFs: "/home/jenkins"
            mode: NORMAL
            instanceCapStr: "2"
