credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "github-oauth-client-id"
              secret: "${GITHUB_OAUTH_CLIENT_ID}"
              description: "GitHub OAuth client ID"
          - string:
              scope: GLOBAL
              id: "github-oauth-client-secret"
              secret: "${GITHUB_OAUTH_CLIENT_SECRET}"
              description: "GitHub OAuth client secret"
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_PAT_TOKEN}"
              description: "GitHub PAT for API calls"
          - basicSSHUserPrivateKey:
              scope: GLOBAL
              id: "ssh-agent-key"
              username: "${SSH_USERNAME}"
              privateKeySource:
                directEntry:
                  privateKey: "${SSH_PRIVATE_KEY}"
              description: "SSH key for build agents" 
          - string:
              scope: GLOBAL
              id: "dockerhub-token"
              secret: "${DOCKERHUB_TOKEN}"
              description: "Docker registry token"
